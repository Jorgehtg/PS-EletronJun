<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMUMIDADE - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e9eef2;
            color: #333;
            padding: 20px;
        }
        header { padding: 20px 10px; text-align: center; }
        header h1 { font-size: 28px; letter-spacing: 1px; }
        .selecao-modo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            background: white;
            padding: 20px;
            border-radius: 50px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .modo-label { font-weight: bold; color: #666; margin-right: 10px; }
        .num-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #ddd;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        .num-btn span { font-size: 18px; }
        .num-btn small { font-size: 8px; text-transform: uppercase; color: #999; }
        .num-btn.ativo {
            color: white;
            border-color: #222;
            background: #222;
            transform: scale(1.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .num-btn.ativo small { color: #ccc; }
        .cards-resumo {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .card-mini {
            background: white;
            padding: 25px;
            border-radius: 15px;
            flex: 1;
            min-width: 200px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
        .valor { font-size: 35px; font-weight: bold; margin-top: 10px; }
        .table-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #eee; color: #888; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f9f9f9; }
        .aviso { text-align: center; padding: 20px; color: #999; }
        .ultima-atualizacao { text-align: center; margin-top: 20px; font-size: 12px; color: #999; }
        .modo-status {
            text-align: center;
            margin-top: 10px;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
        }
        .modo-0 { background: #f8d7da; color: #721c24; }
        .modo-1 { background: #d4edda; color: #155724; }
        .modo-2 { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <header><h1>🌡️ TERMUMIDADE</h1></header>

    <div class="selecao-modo">
        <span class="modo-label">MODO:</span>
        <div class="num-btn" id="btn0" onclick="enviarModo(0)"><span>0</span><small>OFF</small></div>
        <div class="num-btn" id="btn1" onclick="enviarModo(1)"><span>1</span><small>MANUAL</small></div>
        <div class="num-btn" id="btn2" onclick="enviarModo(2)"><span>2</span><small>AUTO</small></div>
    </div>

    <div id="modoStatus" class="modo-status modo-0">🔴 Modo: DESLIGADO</div>

    <div class="cards-resumo">
        <div class="card-mini"><p>🌡️ Temperatura</p><div class="valor" id="currentTemp">-- °C</div></div>
        <div class="card-mini"><p>💧 Umidade</p><div class="valor" id="currentHumid">-- %</div></div>
    </div>

    <div class="table-container">
        <table>
            <thead><tr><th>#</th><th>Temperatura</th><th>Umidade</th><th>Modo</th><th>Data/Hora</th></tr></thead>
            <tbody id="tabela-corpo"><tr class="aviso"><td colspan="5">Aguardando dados...</td></tr></tbody>
        </table>
    </div>
    <div class="ultima-atualizacao" id="ultimaAtualizacao"></div>

    <script>
        const ESP32_IP = "ip_esp";
        const API_URL = `http://${ESP32_IP}:8080/data`;
        const MODO_URL = `http://${ESP32_IP}:8080/modo`;
        
        let historicoLocal = [];

        function atualizarStatusModo(modo) {
            const statusDiv = document.getElementById('modoStatus');
            const nomes = {0: "DESLIGADO", 1: "MANUAL", 2: "AUTOMÁTICO"};
            const icons = {0: "🔴", 1: "🟢", 2: "🟡"};
            statusDiv.innerHTML = `${icons[modo]} Modo: ${nomes[modo]}`;
            statusDiv.className = `modo-status modo-${modo}`;
        }

        async function buscarDados() {
            try {
                const resposta = await fetch(API_URL);
                const dados = await resposta.json();
                
                console.log("Dados recebidos:", dados);
                
                if (dados.temperature !== undefined && dados.humidity !== undefined) {
                    document.getElementById('currentTemp').innerHTML = `${dados.temperature.toFixed(1)} °C`;
                    document.getElementById('currentHumid').innerHTML = `${dados.humidity.toFixed(1)} %`;
                    marcarBotaoAtivo(dados.mode);
                    atualizarStatusModo(dados.mode);
                    
                    const agora = new Date();
                    const novaLeitura = {
                        id: historicoLocal.length + 1,
                        temperature: dados.temperature,
                        humidity: dados.humidity,
                        mode: dados.mode,
                        timestamp: agora.toISOString()
                    };
                    
                    historicoLocal.unshift(novaLeitura);
                    if (historicoLocal.length > 20) historicoLocal.pop();
                    
                    atualizarTabela();
                    document.getElementById('ultimaAtualizacao').innerHTML = `✅ Atualizado: ${agora.toLocaleTimeString()}`;
                }
            } catch (e) { 
                console.error("Erro:", e); 
                document.getElementById('ultimaAtualizacao').innerHTML = `❌ Erro: ${e.message}`;
            }
        }
        
        function atualizarTabela() {
            const corpoTabela = document.getElementById('tabela-corpo');
            corpoTabela.innerHTML = '';
            if (historicoLocal.length === 0) {
                corpoTabela.innerHTML = '<tr class="aviso"><td colspan="5">Nenhuma leitura ainda...</td></tr>';
                return;
            }
            const modoTexto = {0: "OFF", 1: "MANUAL", 2: "AUTO"};
            historicoLocal.forEach(item => {
                corpoTabela.innerHTML += `
                    <tr>
                        <td>#${item.id}</td>
                        <td>${item.temperature.toFixed(1)}°C</td>
                        <td>${item.humidity.toFixed(1)}%</td>
                        <td>${modoTexto[item.mode] || item.mode}</td>
                        <td>${new Date(item.timestamp).toLocaleString()}</td>
                    </tr>
                `;
            });
        }

        async function enviarModo(valor) {
            marcarBotaoAtivo(valor);
            
            try {
                const response = await fetch(MODO_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ modo: valor })
                });
                
                if (response.ok) {
                    console.log("✅ Modo alterado para:", valor);
                    const modoTexto = {0: "DESLIGADO", 1: "MANUAL", 2: "AUTOMÁTICO"};
                    document.getElementById('ultimaAtualizacao').innerHTML = `✅ Modo alterado para ${modoTexto[valor]} - ${new Date().toLocaleTimeString()}`;
                    setTimeout(buscarDados, 500);
                } else {
                    console.log("Erro:", response.status);
                }
            } catch (e) { 
                console.error("Erro ao enviar modo:", e); 
            }
        }

        function marcarBotaoAtivo(num) {
            [0, 1, 2].forEach(i => {
                const btn = document.getElementById('btn' + i);
                if(btn) btn.classList.remove('ativo');
            });
            const btnAtivo = document.getElementById('btn' + num);
            if(btnAtivo) btnAtivo.classList.add('ativo');
        }

        buscarDados();
        setInterval(buscarDados, 3000);
    </script>
</body>
</html>
